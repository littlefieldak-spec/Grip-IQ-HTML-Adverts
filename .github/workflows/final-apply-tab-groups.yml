name: Final apply tab groups

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: final-apply-tab-groups
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Wait for other advert workflows
        run: sleep 45
      - name: Apply final tab grouping changes
        run: |
          git pull --rebase origin main || true
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('gripiq-race-analyzer-advert.html')
          text = path.read_text(encoding='utf-8')
          original = text

          text = re.sub(r'Pace\s+vs\.?\s+Field', 'Long-Run Pace', text, flags=re.IGNORECASE)
          text = text.replace('Compare Long-Run Pace to the Best Drivers in the Field', 'Long-Run Pace')
          text = text.replace('Pit Stop Time', 'Pit Stop Performance')
          text = text.replace('Racecraft Leader Board', 'Racecraft Leaderboard')
          text = text.replace('Watch the panels circulate ↓', '')

          marker = '<!-- GripIQ final grouped tab boxes -->'
          if marker not in text:
              injection = '''<!-- GripIQ final grouped tab boxes -->
<style id="gripiq-final-tab-groups-style">
  .gripiq-tab-groups { display:flex; flex-wrap:wrap; gap:12px; align-items:stretch; margin:0 0 18px; }
  .gripiq-tab-box { display:flex; flex-wrap:wrap; align-items:center; gap:8px; padding:10px; border:1px solid rgba(0,212,240,.30); border-radius:18px; background:rgba(0,30,48,.38); }
  .gripiq-tab-box::before { width:100%; margin:0 0 2px 4px; color:rgba(220,240,255,.72); font-family:Rajdhani,"Exo 2",sans-serif; font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; }
  .gripiq-tab-box--analysis::before { content:"Race & Pace Analysis"; }
  .gripiq-tab-box--execution::before { content:"Execution & Final Report"; }
  .gripiq-tab-box > * { margin:0 !important; }
  @media (max-width:820px){ .gripiq-tab-groups{flex-direction:column;} .gripiq-tab-box{width:100%;} }
</style>
<script id="gripiq-final-tab-groups-script">
(function(){
  function clean(t){return (t||'').replace(/^\s*\d+\s*/,'').replace(/\s+/g,' ').trim();}
  function controls(){return Array.from(document.querySelectorAll('button,a,[role="button"],[data-tab],[data-slide],[tabindex]'));}
  function find(words){return controls().find(function(el){var s=clean(el.textContent).toLowerCase();return words.some(function(w){return s.indexOf(w)>-1;});});}
  function relabel(el,label){if(!el)return;var nodes=[],w=document.createTreeWalker(el,NodeFilter.SHOW_TEXT,null);while(w.nextNode()){var n=w.currentNode;if(n.nodeValue&&n.nodeValue.trim()&&!/^\s*\d+\s*$/.test(n.nodeValue))nodes.push(n);}if(nodes.length)nodes[nodes.length-1].nodeValue=' '+label;else{var p=(el.textContent.match(/^\s*\d+/)||[''])[0];el.textContent=p?p+' '+label:label;}el.setAttribute('aria-label',label);}
  function parent(els){var paths=els.map(function(el){var p=[];while(el){p.push(el);el=el.parentElement;}return p;});return paths[0].find(function(c){return paths.every(function(p){return p.indexOf(c)>-1;});});}
  function hidePositionFlow(){Array.from(document.querySelectorAll('section,article,div')).forEach(function(el){var s=clean(el.textContent).toLowerCase();if((s.startsWith('position flow')||s.indexOf('position flow')>-1)&&!['BUTTON','A'].includes(el.tagName)&&el.querySelector('canvas,img,svg,table,h2,h3'))el.style.display='none';});}
  function run(){
    if(document.querySelector('.gripiq-tab-groups'))return true;
    var race=find(['race summary']), pos=find(['position flow']), pit=find(['pit stop time','pit stop performance']), pace=find(['compare long-run pace','long-run pace','long run pace']), cons=find(['pace vs consistency']), board=find(['racecraft leaderboard','racecraft leader board']), report=find(['final report']);
    if([race,pit,pace,cons,board,report].filter(Boolean).length<5)return false;
    relabel(pace,'Long-Run Pace'); relabel(pit,'Pit Stop Performance'); relabel(board,'Racecraft Leaderboard');
    if(pos)pos.remove(); hidePositionFlow();
    var p=parent([race,pit,pace,cons,board,report].filter(Boolean)); if(!p||p===document.body||p===document.documentElement)return false;
    var wrap=document.createElement('div');wrap.className='gripiq-tab-groups';
    var a=document.createElement('div');a.className='gripiq-tab-box gripiq-tab-box--analysis';
    var e=document.createElement('div');e.className='gripiq-tab-box gripiq-tab-box--execution';
    [race,pace,cons].forEach(function(el){if(el)a.appendChild(el);}); [pit,board,report].forEach(function(el){if(el)e.appendChild(el);});
    wrap.appendChild(a);wrap.appendChild(e);p.insertBefore(wrap,p.firstChild);return true;
  }
  function boot(){var i=0,t=setInterval(function(){i++;if(run()||i>40)clearInterval(t);},150);} if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
})();
</script>
'''
              text = text.replace('</body>', injection + '\n</body>', 1) if '</body>' in text else text + '\n' + injection

          text = re.sub(r'\n{3,}', '\n\n', text)
          if text != original:
              path.write_text(text, encoding='utf-8')
          PY
      - name: Commit and push
        run: |
          if git diff --quiet -- gripiq-race-analyzer-advert.html; then
            echo "No changes needed."
            exit 0
          fi
          git config user.name "chatgpt-github"
          git config user.email "chatgpt-github@users.noreply.github.com"
          git add gripiq-race-analyzer-advert.html
          git commit -m "Apply final grouped race analyzer tab layout"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main || true
            if git push; then exit 0; fi
            sleep 5
          done
          exit 1
