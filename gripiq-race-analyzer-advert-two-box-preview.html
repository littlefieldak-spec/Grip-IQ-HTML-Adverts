<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GripIQ Race Analyzer — Two Box Preview</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #050914;
      color: #e8f6ff;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
    }
    #status {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 1000;
      max-width: 520px;
      padding: 10px 12px;
      border: 1px solid rgba(0, 212, 240, .35);
      border-radius: 10px;
      background: rgba(0, 14, 28, .88);
      color: #cfeeff;
      font-size: 13px;
      line-height: 1.35;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
    }
    iframe {
      display: block;
      width: 100vw;
      height: 100vh;
      border: 0;
      background: #050914;
    }
  </style>
</head>
<body>
  <div id="status">Loading two-box preview…</div>
  <iframe id="preview" title="GripIQ Race Analyzer two-box preview"></iframe>
  <script>
    const statusEl = document.getElementById('status');
    const iframe = document.getElementById('preview');

    const patchCss = `
      .gripiq-tab-groups {
        display: flex !important;
        flex-wrap: wrap !important;
        gap: 12px !important;
        align-items: stretch !important;
        margin: 0 0 18px !important;
      }
      .gripiq-tab-box {
        display: flex !important;
        flex-wrap: wrap !important;
        align-items: center !important;
        gap: 8px !important;
        padding: 10px !important;
        border: 1px solid rgba(0, 212, 240, 0.30) !important;
        border-radius: 18px !important;
        background: rgba(0, 30, 48, 0.38) !important;
        box-shadow: inset 0 0 0 1px rgba(0, 212, 240, 0.04) !important;
      }
      .gripiq-tab-box::before {
        width: 100% !important;
        margin: 0 0 2px 4px !important;
        color: rgba(220, 240, 255, 0.72) !important;
        font-family: Rajdhani, "Exo 2", sans-serif !important;
        font-size: 11px !important;
        font-weight: 700 !important;
        letter-spacing: .12em !important;
        text-transform: uppercase !important;
      }
      .gripiq-tab-box--analysis::before { content: "Race & Pace Analysis"; }
      .gripiq-tab-box--execution::before { content: "Execution & Final Report"; }
      .gripiq-tab-box > * { margin: 0 !important; }
      @media (max-width: 820px) {
        .gripiq-tab-groups { flex-direction: column !important; }
        .gripiq-tab-box { width: 100% !important; }
      }
    `;

    const patchScript = `
      (function () {
        function cleanLabel(text) {
          return (text || '').replace(/^\\s*\\d+\\s*/, '').replace(/\\s+/g, ' ').trim();
        }
        function tabControls() {
          return Array.from(document.querySelectorAll('button, a, [role="button"], [data-tab], [data-slide], [tabindex]'));
        }
        function findControl(matchers) {
          return tabControls().find(function (el) {
            var label = cleanLabel(el.textContent).toLowerCase();
            return matchers.some(function (m) { return label.indexOf(m) !== -1; });
          });
        }
        function relabel(el, label) {
          if (!el) return;
          var textNodes = [];
          var walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
          while (walker.nextNode()) {
            var node = walker.currentNode;
            if (node.nodeValue && node.nodeValue.trim() && !/^\\s*\\d+\\s*$/.test(node.nodeValue)) textNodes.push(node);
          }
          if (textNodes.length) textNodes[textNodes.length - 1].nodeValue = ' ' + label;
          else {
            var prefix = (el.textContent.match(/^\\s*\\d+/) || [''])[0];
            el.textContent = prefix ? prefix + ' ' + label : label;
          }
          el.setAttribute('aria-label', label);
        }
        function commonParent(elements) {
          var paths = elements.map(function (el) {
            var path = [];
            while (el) { path.push(el); el = el.parentElement; }
            return path;
          });
          return paths[0].find(function (candidate) {
            return paths.every(function (path) { return path.indexOf(candidate) !== -1; });
          });
        }
        function hidePositionFlowPanels() {
          Array.from(document.querySelectorAll('section, article, div')).forEach(function (el) {
            var label = cleanLabel(el.textContent).toLowerCase();
            if ((label.startsWith('position flow') || label.indexOf('position flow') !== -1) &&
                !['BUTTON', 'A'].includes(el.tagName) &&
                el.querySelector('canvas, img, svg, table, h2, h3')) {
              el.style.display = 'none';
            }
          });
        }
        function run() {
          if (document.querySelector('.gripiq-tab-groups')) return true;
          var raceSummary = findControl(['race summary']);
          var positionFlow = findControl(['position flow']);
          var pitStop = findControl(['pit stop time', 'pit stop performance']);
          var longRun = findControl(['compare long-run pace', 'long-run pace', 'long run pace']);
          var consistency = findControl(['pace vs consistency']);
          var racecraft = findControl(['racecraft leaderboard', 'racecraft leader board']);
          var finalReport = findControl(['final report']);
          var required = [raceSummary, pitStop, longRun, consistency, racecraft, finalReport].filter(Boolean);
          if (required.length < 5) return false;
          relabel(longRun, 'Long-Run Pace');
          relabel(pitStop, 'Pit Stop Performance');
          relabel(racecraft, 'Racecraft Leaderboard');
          if (positionFlow) positionFlow.remove();
          hidePositionFlowPanels();
          var parent = commonParent(required);
          if (!parent || parent === document.body || parent === document.documentElement) return false;
          var wrapper = document.createElement('div');
          wrapper.className = 'gripiq-tab-groups';
          var analysis = document.createElement('div');
          analysis.className = 'gripiq-tab-box gripiq-tab-box--analysis';
          var execution = document.createElement('div');
          execution.className = 'gripiq-tab-box gripiq-tab-box--execution';
          [raceSummary, longRun, consistency].forEach(function (el) { if (el) analysis.appendChild(el); });
          [pitStop, racecraft, finalReport].forEach(function (el) { if (el) execution.appendChild(el); });
          wrapper.appendChild(analysis);
          wrapper.appendChild(execution);
          parent.insertBefore(wrapper, parent.firstChild);
          return true;
        }
        function boot() {
          var tries = 0;
          var timer = setInterval(function () {
            tries += 1;
            if (run() || tries > 60) clearInterval(timer);
          }, 150);
        }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot); else boot();
      })();
    `;

    async function loadPreview() {
      try {
        const res = await fetch('gripiq-race-analyzer-advert.html?preview-cache-bust=' + Date.now());
        if (!res.ok) throw new Error('Could not fetch source HTML: ' + res.status);
        let html = await res.text();

        html = html
          .replace(/<link[^>]*race-analyzer-tab-groups\.css[^>]*>\s*/gi, '')
          .replace(/<script[^>]*race-analyzer-tab-groups\.js[^>]*>\s*<\/script>\s*/gi, '')
          .replace(/Pace\s+vs\.?\s+Field/gi, 'Long-Run Pace')
          .replace(/Compare Long-Run Pace to the Best Drivers in the Field/g, 'Long-Run Pace')
          .replace(/Pit Stop Time/g, 'Pit Stop Performance')
          .replace(/Racecraft Leader Board/g, 'Racecraft Leaderboard')
          .replace(/Watch the panels circulate ↓/g, '');

        if (html.includes('<head>')) {
          html = html.replace('<head>', '<head><base href="./"><style>' + patchCss + '</style>');
        } else {
          html = '<base href="./"><style>' + patchCss + '</style>' + html;
        }

        if (html.includes('</body>')) {
          html = html.replace('</body>', '<script>' + patchScript + '<\/script></body>');
        } else {
          html += '<script>' + patchScript + '<\/script>';
        }

        iframe.srcdoc = html;
        statusEl.textContent = 'Two-box preview loaded. This is a safe preview page, not the live advert.';
        setTimeout(() => statusEl.style.display = 'none', 4500);
      } catch (err) {
        statusEl.textContent = 'Preview failed: ' + err.message;
      }
    }

    loadPreview();
  </script>
</body>
</html>
